<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Grace Davidson Studio | London Interior Designer</title>
  <meta name="description" content="Explore the portfolio of Grace Davidson Studio — London based residential interior design projects layered with character, antiques and considered detail." />
  <link rel="canonical" href="https://www.gracedavidsonstudio.com/portfolio" />
  <meta property="og:title" content="Portfolio | Grace Davidson Studio" />
  <meta property="og:type" content="website" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --burgundy: #43121F;
      --cream: #FFFAF3;
      --footer-bg: #F3EADC;
      --text: #121212;
      --text-light: #5a5a5a;
      --white: #ffffff;
      --font: "Poppins", sans-serif;
      --transition: 0.3s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body { font-family: var(--font); background-color: var(--cream); color: var(--text); font-size: 15px; line-height: 1.7; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }

    /* HEADER */
    header { background-color: var(--burgundy); display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 0 60px; height: 90px; }
    .header-logo img { width: 160px; height: auto; display: block; }
    nav ul { list-style: none; display: flex; justify-content: flex-end; gap: 48px; }
    nav ul li a { display: block; font-size: 14px; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(237,232,223,0.9); position: relative; transition: color var(--transition); }
    nav ul li a::after { content: ""; position: absolute; bottom: -2px; left: 0; width: 0; height: 1px; background-color: rgba(237,232,223,0.6); transition: width var(--transition); }
    nav ul li a:hover { color: #ede8df; }
    nav ul li a:hover::after { width: 100%; }
    nav ul li a.active { color: #ede8df; }

    /* HAMBURGER */
    .hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 8px; z-index: 1001; }
    .hamburger span { display: block; width: 24px; height: 1.5px; background-color: #ede8df; transition: all 0.3s ease; transform-origin: center; }
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* MOBILE MENU */
    .mobile-menu { display: none; position: fixed; top: 0; right: -100%; width: 220px; height: 100vh; background-color: var(--burgundy); z-index: 1000; flex-direction: column; justify-content: flex-start; align-items: center; padding: 100px 40px 40px; transition: right 0.35s ease; box-shadow: -4px 0 20px rgba(0,0,0,0.2); }
    .mobile-menu.open { right: 0; }
    .mobile-menu ul { list-style: none; display: flex; flex-direction: column; gap: 24px; align-items: center; }
    .mobile-menu ul li a { font-size: 14px; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(237,232,223,0.9); transition: color var(--transition); }
    .mobile-menu ul li a:hover { color: #ede8df; }
    .mobile-menu ul li a.active { border-bottom: 1px solid rgba(237,232,223,0.7); padding-bottom: 2px; }
    .menu-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; }
    .menu-overlay.open { display: block; }

    /* GALLERY */
    .gallery { padding: 60px 40px 80px; max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

    .gallery-row { display: grid; gap: 12px; }
    .portrait-row { grid-template-columns: repeat(3, 1fr); }
    .landscape-row { grid-template-columns: repeat(2, 1fr); }
    .final-row { grid-template-columns: 1fr; }

    .gallery-item {
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }

    .portrait-row .gallery-item { aspect-ratio: 3/4; }
    .landscape-row .gallery-item { aspect-ratio: 3/2; }
    .final-row .gallery-item { aspect-ratio: 16/7; }

    .gallery-img {
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      transition: transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .gallery-item:hover .gallery-img { transform: scale(1.03); }

    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255, 250, 243, 0.96);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .lightbox.open { display: flex; }

    .lightbox-inner {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 90vw;
      max-height: 90vh;
    }

    .lightbox-img {
      max-width: 90vw;
      max-height: 78vh;
      object-fit: contain;
      display: block;
    }

    .lightbox-credits {
      margin-top: 16px;
      text-align: center;
    }

    .lightbox-credits p {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--text-light);
    }

    .lightbox-credits span { color: var(--text); }

    .lightbox-close {
      position: fixed;
      top: 24px;
      right: 32px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--burgundy);
      font-size: 18px;
      font-weight: 300;
      line-height: 1;
      transition: opacity var(--transition);
      z-index: 2001;
      opacity: 0.7;
    }

    .lightbox-close:hover { opacity: 1; }

    .lightbox-prev,
    .lightbox-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--burgundy);
      padding: 16px;
      transition: opacity var(--transition);
      z-index: 2001;
      opacity: 0.6;
      display: flex;
      align-items: center;
    }

    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }
    .lightbox-prev:hover, .lightbox-next:hover { opacity: 1; }

    .lightbox-counter {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--text-light);
    }

    /* SCROLL ANIMATIONS */
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* FOOTER */
    footer {
      background-color: var(--footer-bg);
      padding: 28px 60px 20px;
      position: relative;
    }
    .footer-top { display: flex; justify-content: space-between; align-items: flex-start; max-width: 1200px; margin: 0 auto 20px; }
    .footer-nav ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .footer-nav ul li a { font-size: 11px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-light); transition: color var(--transition); }
    .footer-nav ul li a:hover { color: var(--burgundy); }
    .footer-contact { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
    .footer-contact a { font-size: 11px; font-weight: 400; letter-spacing: 0.1em; color: var(--text-light); transition: color var(--transition); text-transform: uppercase; }
    .footer-contact a:hover { color: var(--burgundy); }
    .footer-copy { font-size: 11px; font-weight: 300; color: var(--text-light); letter-spacing: 0.05em; text-align: right; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      header { padding: 16px 24px; height: auto; }
      .header-logo img { width: 100px; }
      nav { display: none; }
      .hamburger { display: flex; }
      .mobile-menu { display: flex; }
      .gallery { padding: 32px 12px 60px; gap: 8px; }
      .portrait-row { grid-template-columns: repeat(2, 1fr); }
      .landscape-row { grid-template-columns: 1fr; }
      .landscape-row .gallery-item { aspect-ratio: 4/3; width: 100%; }
      .final-row { grid-template-columns: 1fr; }
      .final-row .gallery-item { aspect-ratio: 4/3; width: 80%; margin: 0 auto; }
      .gallery-row { gap: 8px; }
      .gallery-item.lone { grid-column: 1 / -1; width: 50%; margin: 0 auto; }
      .lightbox-credits p { display: flex; flex-direction: column; gap: 4px; }
      footer { padding: 40px 24px 28px; }
      .footer-top { flex-direction: column; gap: 32px; }
      .footer-contact { align-items: flex-start; }
    }
  </style>
</head>

  <script>
    const images = [{"src": "https://picsum.photos/seed/port1/600/800", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/port2/600/800", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/port3/600/800", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/land4/900/600", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/land5/900/600", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/port6/600/800", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/port7/600/800", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/port8/600/800", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/land9/900/600", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/land10/900/600", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/port11/600/800", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/port12/600/800", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/port13/600/800", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/land14/900/600", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/land15/900/600", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/port16/600/800", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/port17/600/800", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/port18/600/800", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/land19/900/600", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/land20/900/600", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/port21/600/800", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/port22/600/800", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/port23/600/800", "contractor": "Contractor Name", "photographer": "Photographer Name"}, {"src": "https://picsum.photos/seed/port24/600/800", "contractor": "Contractor Name", "photographer": "Photographer Name"}];

    // HAMBURGER
    const hamburger = document.querySelector(".hamburger");
    const mobileMenu = document.getElementById("mobileMenu");
    const menuOverlay = document.getElementById("menuOverlay");
    function toggleMenu() {
      const isOpen = mobileMenu.classList.contains("open");
      mobileMenu.classList.toggle("open");
      menuOverlay.classList.toggle("open");
      hamburger.classList.toggle("open");
      hamburger.setAttribute("aria-expanded", !isOpen);
    }
    hamburger.addEventListener("click", toggleMenu);
    menuOverlay.addEventListener("click", toggleMenu);
    mobileMenu.querySelectorAll("a").forEach(a => a.addEventListener("click", toggleMenu));

    // LIGHTBOX
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightboxImg");
    const lightboxContractor = document.getElementById("lightboxContractor");
    const lightboxPhotographer = document.getElementById("lightboxPhotographer");
    const lightboxCounter = document.getElementById("lightboxCounter");
    let currentIndex = 0;

    function openLightbox(index) {
      currentIndex = index;
      updateLightbox();
      lightbox.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      document.body.style.overflow = "";
    }

    function updateLightbox() {
      const img = images[currentIndex];
      lightboxImg.src = img.src;
      lightboxContractor.textContent = img.contractor;
      lightboxPhotographer.textContent = img.photographer;
      lightboxCounter.textContent = (currentIndex + 1) + " / " + images.length;
    }

    function prevImage() { currentIndex = (currentIndex - 1 + images.length) % images.length; updateLightbox(); }
    function nextImage() { currentIndex = (currentIndex + 1) % images.length; updateLightbox(); }

    document.querySelectorAll(".gallery-item").forEach(item => {
      item.addEventListener("click", () => openLightbox(parseInt(item.dataset.index)));
      item.addEventListener("keydown", e => { if (e.key === "Enter") openLightbox(parseInt(item.dataset.index)); });
    });

    document.getElementById("lightboxClose").addEventListener("click", closeLightbox);
    document.getElementById("lightboxPrev").addEventListener("click", prevImage);
    document.getElementById("lightboxNext").addEventListener("click", nextImage);
    lightbox.addEventListener("click", e => { if (e.target === lightbox) closeLightbox(); });

    document.addEventListener("keydown", e => {
      if (!lightbox.classList.contains("open")) return;
      if (e.key === "ArrowLeft") prevImage();
      if (e.key === "ArrowRight") nextImage();
      if (e.key === "Escape") closeLightbox();
    });

    // CENTRE LONE ITEMS ON MOBILE
    function fixLoneItems() {
      if (window.innerWidth > 768) return;
      document.querySelectorAll('.portrait-row').forEach(row => {
        const items = row.querySelectorAll('.gallery-item');
        items.forEach(i => i.classList.remove('lone'));
        if (items.length % 2 !== 0) {
          items[items.length - 1].classList.add('lone');
        }
      });
    }
    fixLoneItems();
    window.addEventListener('resize', fixLoneItems);

    // SCROLL ANIMATIONS
    const revealEls = document.querySelectorAll(".reveal");
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add("visible");
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.05 });
    revealEls.forEach(el => revealObserver.observe(el));
  </script>
