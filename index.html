<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grace Davidson Studio | London Interior Designer</title>
  <meta name="description" content="Grace Davidson Studio is a London based interior design studio creating layered, characterful homes that feel unmistakably personal. Full service, E-Design and hourly consultations available." />
  <meta name="keywords" content="interior designer London, residential interior design, luxury interior design London, e-design, interior consultation London" />
  <link rel="canonical" href="https://www.gracedavidsonstudio.com/" />
  <meta property="og:title" content="Grace Davidson Studio | London Interior Designer" />
  <meta property="og:description" content="London based interior design studio creating layered, characterful homes that feel unmistakably personal." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.gracedavidsonstudio.com/" />
  <meta property="og:image" content="https://www.gracedavidsonstudio.com/images/og-image.jpg" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --burgundy: #43121F;
      --cream: #FFFAF3;
      --footer-bg: #F3EADC;
      --text: #121212;
      --text-light: #5a5a5a;
      --white: #ffffff;
      --font: 'Poppins', sans-serif;
      --transition: 0.3s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background-color: var(--cream);
      color: var(--text);
      font-size: 15px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    a { text-decoration: none; color: inherit; }

    /* =====================
       HEADER
    ===================== */
    header {
      background-color: var(--burgundy); background-image: url("/header-bg.png"); background-size: cover; background-position: center;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 0 60px;
      height: 90px;
      position: relative;
    }

    .header-logo img {
      width: 192px;
      height: auto;
      display: block;
    }

    /* =====================
       NAVIGATION , desktop
    ===================== */
    nav ul {
      list-style: none;
      display: flex;
      justify-content: flex-end;
      gap: 48px;
    }

    nav ul li a {
      display: block;
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(237, 232, 223, 0.9);
      position: relative;
      transition: color var(--transition);
    }

    nav ul li a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background-color: rgba(237, 232, 223, 0.6);
      transition: width var(--transition);
    }

    nav ul li a:hover { color: #ede8df; }
    nav ul li a:hover::after { width: 100%; }

    /* =====================
       HAMBURGER BUTTON
    ===================== */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      z-index: 1001;
    }

    .hamburger span {
      display: block;
      width: 24px;
      height: 1.5px;
      background-color: #ede8df;
      transition: all 0.3s ease;
      transform-origin: center;
    }

    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* =====================
       MOBILE MENU DRAWER
    ===================== */
    .mobile-menu {
      display: none;
      position: fixed;
      top: 0;
      right: -100%;
      width: 220px;
      height: 100vh;
      background-color: var(--burgundy);
      z-index: 1000;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 100px 40px 40px;
      transition: right 0.35s ease;
      box-shadow: -4px 0 20px rgba(0,0,0,0.2);
    }

    .mobile-menu.open {
      right: 0;
    }

    .mobile-menu ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .mobile-menu ul li a {
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(237, 232, 223, 0.9);
      transition: color var(--transition);
      text-align: center;
      display: block;
    }

    .mobile-menu ul li a:hover { color: #ede8df; }
    .mobile-menu ul li a.active { border-bottom: 1px solid rgba(237,232,223,0.7); padding-bottom: 2px; }

    .menu-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 999;
    }

    .menu-overlay.open { display: block; }

    /* =====================
       HERO CAROUSEL
    ===================== */
    .hero {
      position: relative;
      width: 100%;
      height: 66.67vw;
      max-height: 90vh;
      overflow: hidden;
    }

    .carousel-slide {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    .carousel-slide.active { opacity: 1; }

    /* PLACEHOLDER SLIDES , replace with real images from /images/hero/ */
    .carousel-slide:nth-child(1) { background: url('/images/portfolio/bp-living-09.jpg') center/cover no-repeat; }
    .carousel-slide:nth-child(2) { background: url('/images/portfolio/bp-kitchen-05.jpg') center/cover no-repeat; }
    .carousel-slide:nth-child(3) { background: url('/images/portfolio/bp-living-10.jpg') center/cover no-repeat; }
    .carousel-slide:nth-child(4) { background: url('/images/portfolio/bp-ensuite-14.jpg') center/cover no-repeat; }
    .carousel-slide:nth-child(5) { background: url('/images/portfolio/bp-bathroom-19.jpg') center/cover no-repeat; }

    .carousel-dots {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 2;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background-color: rgba(255,255,255,0.45);
      cursor: pointer;
      transition: background-color var(--transition);
      border: none;
    }

    .dot.active { background-color: var(--white); }

    /* =====================
       TWO IMAGE PANELS
    ===================== */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 60px 60px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .panel {
      position: relative;
      overflow: hidden;
      aspect-ratio: 3/4;
      cursor: pointer;
    }

    .panel-img {
      width: 100%; height: 100%;
      transition: transform 0.7s ease;
    }

    /* PLACEHOLDER IMAGES , replace with /images/home/portfolio-panel.jpg and /images/home/services-panel.jpg */
    .panel:nth-child(1) .panel-img { background: url('/images/portfolio/bp-living-11.jpg') center/cover no-repeat; }
    .panel:nth-child(2) .panel-img { background: url('/images/portfolio/bp-wc-13.jpg') center/cover no-repeat; }

    .panel:hover .panel-img { transform: scale(1.04); }

    .panel-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.05) 50%, transparent 100%);
      transition: background var(--transition);
    }

    .panel:hover .panel-overlay {
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.1) 50%, transparent 100%);
    }

    .panel-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      position: absolute;
      bottom: 36px;
      left: 0; right: 0;
      text-align: center;
      z-index: 2;
    }

    .panel-label span {
      display: block;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 10px;
    }

    .panel-label a {
      display: inline-block;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--white);
      border-bottom: 1px solid transparent;
      padding-bottom: 3px;
      transition: border-color var(--transition);
    }

    .panel:hover .panel-label a { border-color: rgba(255,255,255,0.9); }
    .panel-cta {
      display: inline-block;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--white);
      border-bottom: 1px solid transparent;
      padding-bottom: 3px;
      transition: border-color var(--transition);
    }
    .panel:hover .panel-cta { border-color: rgba(255,255,255,0.9); }
    a.panel { text-decoration: none; display: block; cursor: pointer; }

    /* =====================
       FOOTER
    ===================== */
    footer {
      background-color: var(--footer-bg);
      padding: 28px 60px 20px;
      max-height: 240px;
    }

    .footer-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      max-width: 1200px;
      margin: 0 auto 20px;
    }

    .footer-nav ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .footer-nav ul li a {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-light);
      transition: color var(--transition);
    }

    .footer-nav ul li a:hover { color: var(--burgundy); }

    .footer-contact {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .footer-contact a {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--text-light);
      transition: color var(--transition);
      text-transform: uppercase;
    }

    .footer-contact a:hover { color: var(--burgundy); }

    .footer-logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .footer-logo-wrap img {
      width: 80px;
      height: auto;
      display: block;
    }

    .footer-copy {
      font-size: 11px;
      font-weight: 300;
      color: var(--text-light);
      letter-spacing: 0.05em;
      text-align: right;
    }

    /* =====================
       SCROLL ANIMATIONS
    ===================== */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.8s cubic-bezier(0.25, 0.1, 0.25, 1), transform 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }

    /* =====================
       FADE IN (legacy)
    ===================== */
    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .fade-in.visible { opacity: 1; transform: translateY(0); }

    /* =====================
       RESPONSIVE
    ===================== */
    @media (max-width: 768px) {
      header { padding: 16px 24px; height: auto; background-size: 150%; }
      .header-logo img { width: 100px; }
      nav { display: none; }
      .hamburger { display: flex; }
      .mobile-menu { display: flex; }
      .hero { height: 55vh; }
      .panels { grid-template-columns: 1fr 1fr; padding: 40px 16px 60px; gap: 12px; }
      .panel { aspect-ratio: 3/4; }
      footer { padding: 40px 24px 28px; }
      .footer-top { flex-direction: column; gap: 32px; }
      .footer-contact { align-items: flex-start; }
      .footer-bottom { flex-direction: column; align-items: flex-start; gap: 20px; }
    }

    /* PAGE ENTRANCE ANIMATIONS */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero { animation: fadeIn 1.2s ease 0.1s both; }
    .panels { animation: fadeUp 0.9s cubic-bezier(0.23,1,0.32,1) 0.5s both; }
  </style>
</head>

  <script>
    // HAMBURGER MENU
    const hamburger = document.querySelector('.hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    const menuOverlay = document.getElementById('menuOverlay');

    function toggleMenu() {
      const isOpen = mobileMenu.classList.contains('open');
      mobileMenu.classList.toggle('open');
      menuOverlay.classList.toggle('open');
      hamburger.classList.toggle('open');
      hamburger.setAttribute('aria-expanded', !isOpen);
    }

    hamburger.addEventListener('click', toggleMenu);
    menuOverlay.addEventListener('click', toggleMenu);
    mobileMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', toggleMenu));
    const slides = document.querySelectorAll('.carousel-slide');
    const dots = document.querySelectorAll('.dot');
    let current = 0;

    function goTo(index) {
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      dots[current].setAttribute('aria-selected', 'false');
      current = (index + slides.length) % slides.length;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
      dots[current].setAttribute('aria-selected', 'true');
    }

    dots.forEach((dot, i) => dot.addEventListener('click', () => goTo(i)));
    setInterval(() => goTo(current + 1), 5000);

    // SCROLL ANIMATIONS
    const animEls = document.querySelectorAll('.fade-in, .reveal');
    const animObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          animObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12 });
    animEls.forEach(el => animObserver.observe(el));
  </script>
